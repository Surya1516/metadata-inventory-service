version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: metadata_inventory
      FETCH_TIMEOUT: "10"
      LOG_LEVEL: INFO
    depends_on:
      mongo:
        condition: service_healthy
    restart: on-failure

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
